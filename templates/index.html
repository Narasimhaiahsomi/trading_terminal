<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRADING TERMINAL</title>
    <link rel="stylesheet" href="/static/css/terminal.css">
</head>
<body>
    <!-- TOP BAR: Indices + VIX + Market Status -->
    <div class="top-bar" id="indices-bar">
        <div class="loading">CONNECTING TO MARKET DATA...</div>
    </div>

    <!-- SECTOR BAR -->
    <div class="sector-bar" id="sector-bar"></div>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">
        <!-- WATCHLIST TOGGLE (shown when collapsed) -->
        <div class="wl-toggle-bar" id="wl-toggle-bar" onclick="App.toggleWatchlistPanel()">
            <span>▶</span>
            <span class="wl-toggle-label">W<br>A<br>T<br>C<br>H</span>
        </div>

        <!-- WATCHLIST SIDEBAR -->
        <div class="watchlist-panel" id="watchlist-panel">
            <div class="wl-header">
                <h3>WATCHLIST</h3>
                <div>
                    <button onclick="App.promptAddWatchlist()">+ ADD</button>
                    <button onclick="App.toggleWatchlistPanel()" title="Hide watchlist">◀</button>
                </div>
            </div>
            <div id="watchlist-items">
                <div class="wl-empty">Loading...</div>
            </div>
        </div>

        <!-- SCREENER / TABS AREA -->
        <div class="screener-area">
            <div class="tab-bar">
                <div class="version-toggle" onclick="App.toggleVersion()">
                    <span class="ver-label" id="ver-label">V1</span>
                </div>
                <!-- V1 tabs (always visible) -->
                <button class="tab-btn active" data-tab="screener">SCREENER</button>
                <button class="tab-btn" data-tab="volatile">VOLATILE</button>
                <button class="tab-btn" data-tab="active">MOST ACTIVE</button>
                <button class="tab-btn" data-tab="losers">LOSERS</button>
                <button class="tab-btn" data-tab="afterhours">AFTER HRS</button>
                <button class="tab-btn" data-tab="squeeze">SHORT SQUEEZE</button>
                <button class="tab-btn" data-tab="learn">LEARN</button>
                <!-- V2 tabs (hidden by default) -->
                <button class="tab-btn v2-tab" data-tab="gainers">GAINERS</button>
                <button class="tab-btn v2-tab" data-tab="trending">TRENDING</button>
                <button class="tab-btn v2-tab" data-tab="unusualvol">UNUSUAL VOL</button>
                <button class="tab-btn v2-tab" data-tab="dividend">DIVIDEND</button>
                <button class="tab-btn v2-tab" data-tab="smallcap">SMALL CAP</button>
                <button class="tab-btn v2-tab" data-tab="largecap">LARGE CAP</button>
                <button class="tab-btn v2-tab" data-tab="expensive">EXPENSIVE</button>
                <button class="tab-btn v2-tab" data-tab="highbeta">HIGH BETA</button>
                <button class="tab-btn v2-tab" data-tab="52wgainers">52W GAINERS</button>
                <button class="tab-btn v2-tab" data-tab="52wlosers">52W LOSERS</button>
            </div>
            <div class="tab-content">
                <div class="tab-panel active" id="tab-screener"><div class="loading">LOADING...</div></div>
                <div class="tab-panel" id="tab-gainers"></div>
                <div class="tab-panel" id="tab-losers"></div>
                <div class="tab-panel" id="tab-active"></div>
                <div class="tab-panel" id="tab-volatile"></div>
                <div class="tab-panel" id="tab-trending"></div>
                <div class="tab-panel" id="tab-unusualvol"></div>
                <div class="tab-panel" id="tab-dividend"></div>
                <div class="tab-panel" id="tab-smallcap"></div>
                <div class="tab-panel" id="tab-largecap"></div>
                <div class="tab-panel" id="tab-expensive"></div>
                <div class="tab-panel" id="tab-highbeta"></div>
                <div class="tab-panel" id="tab-52wgainers"></div>
                <div class="tab-panel" id="tab-52wlosers"></div>
                <div class="tab-panel" id="tab-afterhours"></div>
                <div class="tab-panel" id="tab-squeeze"></div>
                <div class="tab-panel" id="tab-learn"></div>
            </div>
        </div>
    </div>

    <!-- DETAIL PANEL (slides from right) -->
    <div class="detail-panel" id="detail-panel">
        <button class="detail-close" onclick="App.closeDetail()">✕</button>
        <div id="detail-body"></div>
    </div>

    <!-- SEARCH OVERLAY -->
    <div class="search-overlay" id="search-overlay">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="SEARCH TICKER..." oninput="App.doSearch()" onkeydown="if(event.key==='Escape')App.closeSearch()">
            <div id="search-results"></div>
        </div>
    </div>

    <!-- ALERT MODAL -->
    <div class="alert-modal" id="alert-modal">
        <div class="alert-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <span class="alert-title">PRICE ALERTS</span>
                <button onclick="Alerts.closeModal()" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">✕</button>
            </div>
            <div id="alert-list"></div>
        </div>
    </div>

    <!-- ALERT TOAST -->
    <div class="alert-toast" id="alert-toast"></div>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <div class="shortcuts">
            <span><kbd>/</kbd> Search</span>
            <span><kbd>W</kbd> Watchlist</span>
            <span><kbd>A</kbd> Alerts</span>
            <span><kbd>R</kbd> Refresh</span>
            <span><kbd>Esc</kbd> Close</span>
        </div>
        <span id="last-update">Loading...</span>
    </div>

    <script src="/static/js/charts.js"></script>
    <script src="/static/js/watchlist.js"></script>
    <script src="/static/js/screener.js"></script>
    <script src="/static/js/alerts.js"></script>
    <script src="/static/js/panels.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
